spring:
  application:
    name: wms-cashier
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 5000
      default-expire: 1800
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${AUTH_ISSUER_URI:http://localhost:9001}/oauth2/jwks

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    org.springframework.security: INFO

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

auth:
  issuer-uri: ${AUTH_ISSUER_URI:http://localhost:9001}

wms:
  oauth:
    auth-service-uri: ${AUTH_SERVICE_URI:http://localhost:9001}
    client-id: ${OAUTH2_CLIENT_ID:sample-client}
    redirect-uri: ${OAUTH2_REDIRECT_URI:http://localhost:4300/callback}
    session:
      cookie-secure: ${SESSION_COOKIE_SECURE:false}
